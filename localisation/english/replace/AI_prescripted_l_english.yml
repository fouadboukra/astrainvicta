  PRESCRIPTED_system_name_essharian_mandate: "Essh-Varath"

  EMPIRE_DESIGN_vaekharan_council: "Vaekharan Council"
  EMPIRE_DESIGN_vaekharan_council_desc: "The Vaekhar emerged from the deep caverns of their world with a singular conviction: that all life beyond their own is a corruption to be purged. Their Council is a body of High Leaders who govern through spiritual edict and bureaucratic iron. Industrious and relentless, the Vaekhar have turned their subterranean origins into a cultural identity - darkness is purity, the surface is contamination, and the stars are a blight waiting to be cleansed."
  PRESCRIPTED_ship_prefix_vaekharan_council: "VCS"
  PRESCRIPTED_species_name_vaekharan_council: "Vaekhar"
  PRESCRIPTED_species_plural_vaekharan_council: "Vaekhars"
