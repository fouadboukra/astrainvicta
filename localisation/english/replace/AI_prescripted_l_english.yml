  PRESCRIPTED_system_name_zhael_choir: "Zhael-Uum"

  EMPIRE_DESIGN_athari_concord: "Athari Concord"
  EMPIRE_DESIGN_athari_concord_desc: "The Athari are a long-lived molluscoid civilisation whose homeworld was destroyed in the deep past - or so their oldest memories suggest. They now inhabit a vast shattered ring, a monument to an age they no longer fully remember. Inward-looking and deeply intellectual, the Concord hoards knowledge and resources with equal obsession, distrustful of the galaxy beyond their ring's edge."
  PRESCRIPTED_ship_prefix_athari_concord: "ACS"
  PRESCRIPTED_species_name_athari_concord: "Athari"
