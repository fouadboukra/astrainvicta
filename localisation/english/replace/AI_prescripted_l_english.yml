l_english:
  EMPIRE_DESIGN_humans1: "United Nations of Sol"
  EMPIRE_DESIGN_humans1_desc: "The myriad Human nations that constitute their interstellar government are disparate, yet united in purpose. These bipedal mammalians have developed a society that encourages and even thrives on individual freedoms and cultural differences - as a result, Humans tend to integrate well with alien populations.\n\nDespite this, they have strong martial traditions (produced by millennia of intermittent warfare on their homeworld) and their sometimes aggressive and unpredictable nature should not be underestimated."
  PRESCRIPTED_ship_prefix_humans1: "UNS"
  PRESCRIPTED_species_name_humans1: "Human"
  PRESCRIPTED_species_plural_humans1: "Humans"
  PRESCRIPTED_species_adjective_humans1: "Human $1$"
  PRESCRIPTED_adjective_humans1: "Human"
  PRESCRIPTED_ruler_name_humans1: "Dolores Muwanga"

  EMPIRE_DESIGN_humans2: "Commonwealth of Man"
  EMPIRE_DESIGN_humans2_desc: "The UN-sponsored Ulysses Initiative oversaw the construction of six great ark ships in low Earth orbit at the end of the 21st century. The ships, carrying a quarter million colonists each, were sent through a recently discovered subspace phenomenon on the outer edge of the Oort Cloud - a small, unstable wormhole. None were heard from again, and the destabilized wormhole vanished.\n\nYet unbeknownst to Earth, one of the ark ships survived the passage and established a flourishing colony on a lush alien moon. The pioneers who tamed this world were determined to realize humanity's manifest destiny - dominion over the galaxy at any cost."
  PRESCRIPTED_ship_prefix_humans2: "CNS"
  PRESCRIPTED_species_name_humans2: "Human"
  PRESCRIPTED_species_plural_humans2: "Humans"
  PRESCRIPTED_species_adjective_humans2: "Human $1$"
  PRESCRIPTED_adjective_humans2: "Human"
  PRESCRIPTED_ruler_name_humans2: "Sidney Beauclair"

  EMPIRE_DESIGN_kvarian_league: "K'varian League"
  EMPIRE_DESIGN_kvarian_league_desc: "The K'vari are a fierce avian species whose society is structured entirely around martial excellence and the pursuit of dominance. Their League is less a democracy than an oligarchy of warlords, each vying for influence through displays of strength and cunning. To the K'vari, war is not a last resort - it is the highest form of expression, and the galaxy is their proving ground."
  PRESCRIPTED_ship_prefix_kvarian_league: "KLV"
  PRESCRIPTED_species_name_kvarian_league: "K'vari"
  PRESCRIPTED_species_plural_kvarian_league: "K'vari"
  PRESCRIPTED_species_adjective_kvarian_league: "K'vari"
  PRESCRIPTED_adjective_kvarian_league: "K'vari"
  PRESCRIPTED_ruler_name_kvarian_league: "Saakubik"
  PRESCRIPTED_ruler_title_kvarian_league: "Kel-Sorath"
  PRESCRIPTED_planet_name_kvarian_league: "K'var"
  PRESCRIPTED_system_name_kvarian_league: "K'var'Tukk"

  EMPIRE_DESIGN_essharian_mandate: "Essharian Mandate"
  EMPIRE_DESIGN_essharian_mandate_desc: "The Esshari are an ancient reptilian species who have outlasted dynasties and empires across millennia. Their Mandate is built on rigid hierarchy, spiritual devotion, and an unshakeable belief in their divine right to rule. The Esh'Karan does not merely govern - she embodies the will of the Esshari people and the gods they serve. Their patience is as vast as their memory, and they do not forgive those who have wronged them."
  PRESCRIPTED_ship_prefix_essharian_mandate: "EMS"
  PRESCRIPTED_species_name_essharian_mandate: "Esshari"
  PRESCRIPTED_species_plural_essharian_mandate: "Essharians"
  PRESCRIPTED_species_adjective_essharian_mandate: "Esshari"
