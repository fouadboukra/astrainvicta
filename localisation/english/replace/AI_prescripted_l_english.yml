  PRESCRIPTED_system_name_selkari_confederation: "Sel-Karath"

  EMPIRE_DESIGN_eridian_republic: "Eridian Republic"
  EMPIRE_DESIGN_eridian_republic_desc: "The Eridians are a lithoid species from the arid world of Erid in the 40 Eridani system, a star visible from Earth with the naked eye. Their slow metabolisms and geological patience have shaped a culture of careful deliberation and deep craftsmanship. The Republic values reason, science, and the free exchange of ideas - though their pacifist leanings have not made them naive. They know the galaxy is dangerous, and they intend to be too useful to destroy."
