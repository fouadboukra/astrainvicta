  PRESCRIPTED_planet_name_vaekharan_council: "Vaekh"
  PRESCRIPTED_system_name_vaekharan_council: "Vaekh-Sor"

  EMPIRE_DESIGN_zhael_choir: "Zhael Choir"
  EMPIRE_DESIGN_zhael_choir_desc: "The Zhael are a fungoid hive consciousness that experiences the universe not as individuals but as a vast, resonant song. Their Choir is not governed - it is felt. Every spore and every tendril participates in an endless harmony of thought and purpose. The Zhael do not seek conquest; they seek to expand the song, drawing new worlds into their slow, gentle, inevitable embrace."
  PRESCRIPTED_ship_prefix_zhael_choir: "ZCV"
  PRESCRIPTED_species_name_zhael_choir: "Zhael"
  PRESCRIPTED_species_plural_zhael_choir: "Zhaeli"
