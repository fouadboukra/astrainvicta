  EMPIRE_DESIGN_selkari_confederation: "Selkari Confederation"
  EMPIRE_DESIGN_selkari_confederation_desc: "The Selkari are a humanoid species who rose to power in the shadow of something they cannot name. Their earliest records speak only of a darkness between the stars that devoured whole colonies - and the survivors who clawed their way back. The Confederation is run by a shadow council of military oligarchs who have shaped Selkari society into one of paranoid discipline and ruthless self-interest. They trust no one, trade in secrets, and keep their people comfortable enough not to ask questions."
  PRESCRIPTED_ship_prefix_selkari_confederation: "SCS"
  PRESCRIPTED_species_name_selkari_confederation: "Selkari"
