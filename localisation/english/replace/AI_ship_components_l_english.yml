  FISSION_REACTOR: "Fission Reactor"
  FISSION_REACTOR_DESC: "A solid-core nuclear fission reactor using enriched actinide fuel rods. Controlled chain reactions generate thermal energy converted to electricity via turbine or thermoelectric systems. Reliable and well-understood technology, limited by fuel availability and relatively low power density."
  FUSION_REACTOR: "Fusion Reactor"
  FUSION_REACTOR_DESC: "A magnetic confinement fusion reactor sustaining a deuterium-tritium plasma at stellar core temperatures. Powerful superconducting magnets contain the reaction in a toroidal vacuum chamber. Enormous power output relative to fission, but the magnetic confinement systems are massive and require exotic isotope feedstock."
  COLD_FUSION_REACTOR: "Inertial Confinement Reactor"
  COLD_FUSION_REACTOR_DESC: "High-energy lasers or particle beams compress fusion fuel pellets to extreme density, triggering ignition without continuous magnetic confinement. The implosion geometry achieves higher peak power density than magnetic approaches, enabling more compact reactor designs for the same output."
  ZERO_POINT_REACTOR: "Vacuum Energy Reactor"
  ZERO_POINT_REACTOR_DESC: "Extracts usable energy from quantum vacuum fluctuations — the irreducible energy present in empty space itself. The theoretical basis was established centuries ago by the Casimir effect, but practical energy extraction at scale requires materials science and field manipulation far beyond conventional physics."
  ANTIMATTER_REACTOR: "Antimatter Reactor"
  ANTIMATTER_REACTOR_DESC: "Controlled matter-antimatter annihilation converts mass directly to energy with near-perfect efficiency. Magnetic bottles contain antihydrogen fuel, metering the annihilation rate to maintain stable power output. Requires dedicated antimatter production facilities and extraordinarily precise containment engineering."

  SCIENCE_LAB_1: "Science Lab"
  MEDIUM_SCIENCE_LAB_1_DESC: "Shipboard Science Labs allow for basic research tasks and the surveying of celestial bodies."
  CURATOR_EXPLORER_LAB: "$tech_curator_lab$"
  CURATOR_ARCHEOLOGY_LAB: "$tech_archeology_lab$"

  SENSOR_1: "Space Radar Array"
  SENSOR_1_DESC: "Active and passive electromagnetic sensor suite operating across radio, microwave, and infrared bands. Effective for detection and targeting within a star system, though limited by lightspeed propagation delay at extreme distances."
  SENSOR_2: "Gravitational Wave Sensor Array"
  SENSOR_2_DESC: "Miniaturized gravitational wave interferometry detects the mass signatures of ships, stations, and celestial bodies through spacetime perturbations. Cannot be jammed or spoofed by electromagnetic countermeasures — any object with mass is detectable."
  SENSOR_3: "Neutrino Imaging Array"
  SENSOR_3_DESC: "Detects the neutrino flux emitted by nuclear reactors and fusion drives. Neutrinos pass through all conventional matter unimpeded, making this sensor type impossible to shield against. Any ship with a running reactor is visible regardless of stealth measures."
  SENSOR_4: "Tachyon Sensor Array"
  SENSOR_4_DESC: "Exploits theoretical tachyonic field interactions to detect targets faster than lightspeed propagation would allow. Effective detection range far exceeds any sensor limited by the speed of light. The operating principles are speculative but the results are undeniable."

  AFTERBURNER_1: "Afterburners"
  AFTERBURNER_1_DESC: "Afterburners provide additional combat speed for the ship."
  AFTERBURNER_2: "Advanced Afterburners"
  AFTERBURNER_2_DESC: "These improved afterburners provide even more combat speed for the ship."
  SHIELD_BOOSTER: "Shield Capacitor"
  SHIELD_BOOSTER_DESC: "$tech_shield_rechargers_1_desc$"
  SHIELD_HARDENER_1: "Shield Hardener"
  SHIELD_HARDENER_1_DESC: "With these modifications, the fields generated by our shield emitters will partially deflect attacks that would otherwise bypass the shields."
  SHIELD_HARDENER_2: "Advanced Shield Hardener"
  SHIELD_HARDENER_2_DESC: "Zro particles raised to a high energy state add fluctuations to our shields that can deflect certain weapons that would otherwise easily penetrate the fields."

  FIRE_CONTROL_1: "Auxiliary Fire-control"
  FIRE_CONTROL_1_DESC: "By installing an auxiliary fire-control system our ships can afford to make more advanced calculations, increasing accuracy."

  AUTO_REPAIR: "Regenerative Hull Tissue"
  AUTO_REPAIR_DESC: "These bacteria are imprinted with the ship's structural design and will attempt to restore hull integrity should it be compromised."
