  MEDIUM_AUTOCANNON_2: "Medium $AUTOCANNON_2$"
  LARGE_AUTOCANNON_2: "Large $AUTOCANNON_2$"
  SMALL_AUTOCANNON_3: "Small $AUTOCANNON_3$"
  MEDIUM_AUTOCANNON_3: "Medium $AUTOCANNON_3$"
  LARGE_AUTOCANNON_3: "Large $AUTOCANNON_3$"

  # ============================================================
  # KINETIC ARTILLERY — Long-range kinetic. Follows kinetic pattern.
  # ============================================================

  KINETIC_ARTILLERY_1: "Linear Accelerator"
  KINETIC_ARTILLERY_1_DESC: "A long-range kinetic weapon that uses a linear particle accelerator to launch tungsten penetrators at extreme velocities. The extended acceleration path allows the projectiles to reach hypersonic speeds, increasing both range and armor penetration capability. Effective against capital ships and orbital installations, but requires precise targeting due to projectile travel time."
  KINETIC_ARTILLERY_2: "Magnetohydrodynamics Linear Accelerator"
  KINETIC_ARTILLERY_2_DESC: "An advanced kinetic artillery system that combines linear acceleration with magnetohydrodynamic (MHD) principles. The weapon uses a plasma channel to further accelerate the projectile after it leaves the barrel, achieving even higher velocities. The result is a kinetic weapon with unparalleled range and penetration, capable of striking targets across an entire star system with devastating effect."

  # ============================================================
  # XL WEAPONS — Spinal mounts
  # ============================================================

  MASS_ACCELERATOR_1: "Spinal Magnetic Accelerator"
  MASS_ACCELERATOR_1_DESC: "A spinal-mounted Lorentz railgun with an extended acceleration path. The ship-length barrel allows for higher muzzle velocities, increasing both range and armor penetration capability. A direct hit delivers enough kinetic energy to split a capital ship in half."
  MASS_ACCELERATOR_2: "Spinal Relativistic Mass Accelerator"
  MASS_ACCELERATOR_2_DESC: "A spinal-mounted mass driver that uses controlled antimatter micro-annihilations to generate electromagnetic pulses of extraordinary intensity, accelerating penetrators to velocities where relativistic mass increase becomes a factor. The energy density of antimatter reactions enables a class of kinetic weapon that was previously theoretical — capable of striking targets across an entire star system with devastating effect."

  ENERGY_LANCE_1: "Spinal X-Ray Laser"
  ENERGY_LANCE_1_DESC: "A ship-length optical assembly focusing a high-power free-electron laser into a coherent beam of extreme intensity. At close-to-medium range, it ablates through the heaviest armor plating. Electromagnetic shields absorb significant energy, limiting effectiveness against shielded targets."
  ENERGY_LANCE_2: "Spinal Graser"
  ENERGY_LANCE_2_DESC: "A spinal-mount gamma-ray laser combining multiple free-electron emitters through filled-aperture beam combining. The extremely short wavelength focuses to near-diffraction-limited spot sizes, delivering the highest energy density of any directed-energy weapon. The ultimate armor-killing weapon."

  ENERGY_LANCE_TURRET_1: "$ENERGY_LANCE_1$ Turret"
  ENERGY_LANCE_TURRET_1_DESC: "$ENERGY_LANCE_1_DESC$"
  ENERGY_LANCE_TURRET_2: "$ENERGY_LANCE_2$ Turret"
  ENERGY_LANCE_TURRET_2_DESC: "$ENERGY_LANCE_2_DESC$"

  ARC_EMITTER_1: "Spinal Neutron Projector"
  ARC_EMITTER_1_DESC: "A massive spinal-mount neutron source projecting an intense flux of fast neutrons. Because neutrons are electrically neutral, the beam passes through both electromagnetic shields and physical armor to irradiate internal systems. Damage output is highly variable but guaranteed against any defense configuration."
  ARC_EMITTER_2: "Focused Spinal Neutron Projector"
  ARC_EMITTER_2_DESC: "An upgraded spinal neutron array with improved beam concentration and higher average flux density. While still exhibiting significant shot-to-shot variance, the concentrated beam delivers more consistent radiation damage to internal ship systems."

  # ============================================================
  # TITAN WEAPON
  # ============================================================

  PERDITION_BEAM: "Titanic Graser"
  PERDITION_BEAM_DESC: "A colossal spinal-mounted gamma-ray laser array utilizing multi-stage amplification. At the power levels this weapon operates, even the most advanced ablative coatings are overwhelmed in fractions of a second. The ultimate expression of directed-energy technology — designed to crack open heavily armored capital ships and orbital fortifications."
  PERDITION_BEAM_TITAN: "$PERDITION_BEAM$"
  PERDITION_BEAM_ION: "Ion Cannon"
  PERDITION_BEAM_FLEET_EFFECT: "§YCollateral Damage:§! Deals §G$@perdition_beam_fleet_damage|0G$§! damage to all ships within §G$@perdition_beam_collateral_range|0Y$§! of the target."
  ION_CANNON_FLEET_EFFECT: "§YCollateral Damage:§! Deals §G$@ion_cannon_fleet_damage|0G$§! damage to all ships within §G$@ion_cannon_collateral_range|0Y$§! of the target."

  # ============================================================
  # POINT DEFENSE — Normalized for PD role
  # ============================================================

  POINT_DEFENCE_1: "Point Defense Laser Turret"
  POINT_DEFENCE_1_DESC: "A single-emitter solid-state laser turret for intercepting incoming missiles and strike craft. Speed-of-light engagement eliminates lead calculation — if the tracking system can follow it, the beam is already on target."
  POINT_DEFENCE_2: "Point Defense Arc Laser Turret"
  POINT_DEFENCE_2_DESC: "Arc-lamp pumped point defense laser with higher sustained output. Can burn through missile guidance systems at moderate range and damage hardened warhead casings."
  POINT_DEFENCE_3: "Point Defense Phaser Turret"
  POINT_DEFENCE_3_DESC: "Pulsed-mode point defense laser delivering concentrated energy bursts. The phaser mode enables rapid target switching — the turret can engage multiple incoming threats in the time a continuous-wave laser would spend on one. The premier missile defense system."

  FLAK_BATTERY_1: "Point Defense Cannon Turret"
  FLAK_BATTERY_1_DESC: "A rapid-fire kinetic cannon with proximity-fused fragmentation rounds. Creates a shrapnel cloud in the path of incoming missiles. Lower power draw than laser alternatives but requires physical ammunition."
  FLAK_BATTERY_2: "Multi-barrel Point Defense Cannon Turret"
  FLAK_BATTERY_2_DESC: "Multi-barrel rotary configuration with automated fire control. Higher sustained rate of fire creates a denser defensive fragmentation envelope."
  FLAK_BATTERY_3: "Tracking Point Defense Cannon Array"
  FLAK_BATTERY_3_DESC: "Multiple coordinated rotary barrels with predictive tracking algorithms. AI-assisted target prioritization ensures the most threatening incoming munitions are engaged first, creating an extremely dense defensive envelope."
  FLAK_BATTERY_4: "Integrated Point Defense Cannon System"
  FLAK_BATTERY_4_DESC: "A fully networked point defense system linking multiple rotary mounts with shared sensor data and fleet-level fire coordination. Interception capability exceeds the sum of its individual components."

  # ============================================================
  # SWARMER MISSILES → Cluster Munitions
  # ============================================================

  SWARMER_MISSILE_1: "Submunition Dispenser"
  SWARMER_MISSILE_1_DESC: "A carrier vehicle that deploys multiple independently-guided fragmentation submunitions. The volume of incoming warheads saturates enemy point defense — intercepting one leaves a dozen more inbound."
  SWARMER_MISSILE_2: "Saturator Submunition Dispenser"
  SWARMER_MISSILE_2_DESC: "An advanced dispenser deploying submunition swarms with shared targeting data. The submunitions distribute themselves across the target's defensive blind spots in coordinated attack patterns."

  # ============================================================
  # STRIKE CRAFT → Drone Squadrons
  # ============================================================

  strike_craft: "Drone Squadron"
  strike_crafts: "Drone Squadrons"

  STRIKE_CRAFT_HANGAR_1: "Interceptor Drone Squadron"
  STRIKE_CRAFT_HANGAR_1_DESC: "A squadron of small autonomous combat platforms with basic maneuvering capability and shaped-charge impactors. Fragile and expendable, but they force the enemy to divert point defense resources and can strike from angles outside the target's primary firing arcs."
  STRIKE_CRAFT_HANGAR_2: "Strike Drone Squadron"
  STRIKE_CRAFT_HANGAR_2_DESC: "Purpose-built unmanned combat vehicles armed with miniaturized rotary autocannons. More durable than interceptor drones and capable of multiple engagement passes before returning to the carrier for rearming."
  STRIKE_CRAFT_HANGAR_3: "Assault Drone Squadron"
  STRIKE_CRAFT_HANGAR_3_DESC: "Advanced AI flight control enables complex evasive maneuvering at accelerations that would kill a biological pilot. Each drone carries a miniaturized coilgun and micro-missile rack, providing both anti-ship and anti-drone capability."

