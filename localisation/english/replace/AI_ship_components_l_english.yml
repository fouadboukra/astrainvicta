  # Ship Components
  ####################################
  # ============================================================
  # Astra Invicta - HARD SCI-FI WEAPON OVERHAUL — Localization Changes
  # Only entries that differ from the user's existing file.
  # Merge these into your existing localization file.
  # ============================================================

  # ============================================================
  # MISSILES — Conventional warheads only. Tiers describe delivery system advancement.
  # Torpedoes carry the non-conventional (nuclear) warheads now.
  # ============================================================

  MISSILE_1: "Radar-Guided Missile Bay"
  MISSILE_1_DESC: "A radar-guided missile carrying a high-explosive fragmentation warhead. Chemical propellant provides reliable thrust, while a basic terminal guidance package ensures target acquisition. The workhorse standoff weapon of early fleet combat."
  MISSILE_2: "Boost-Glide Missile Bay"
  MISSILE_2_DESC: "Two-stage propulsion separates the booster phase from the cruise sustainer, extending effective range and increasing terminal velocity. An improved warhead delivers greater blast energy on impact."
  MISSILE_3: "Multi-Spectral Missile Bay"
  MISSILE_3_DESC: "Multi-spectral seeker head combining radar, infrared, and optical tracking resists decoys and jamming. A shaped-charge warhead focuses blast energy for maximum armor penetration."
  MISSILE_4: "Maneuvering Reentry Missile Bay"
  MISSILE_4_DESC: "Onboard thrust vectoring enables evasive terminal maneuvering during the final approach phase, significantly reducing interception probability. The warhead incorporates a tandem shaped-charge design."
  MISSILE_5: "Autonomous Engagement Missile Bay"
  MISSILE_5_DESC: "Hardened guidance electronics resist electronic countermeasures. An onboard ECM suite actively jams enemy tracking during approach. Cooperative engagement protocols enable salvo-level target coordination between missiles."

  MISSILE_1_LAUNCHER: "Guided Missile Bay"
  MISSILE_2_LAUNCHER: "Multi-Stage Missile Bay"

  # ============================================================
  # TORPEDOES — Non-conventional (nuclear/fusion/antimatter) warheads.
  # These are the heavy hitters. Capital ship and starbase killers.
  # ============================================================

  TORPEDO_1: "Fission Missile Bay"
  TORPEDO_1_DESC: "A heavy guided missile carrying a fission warhead with a 20-50 kiloton yield. Armored casing resists point defense fire during approach. The detonation delivers catastrophic thermal-kinetic energy to armor plating. Any spacefaring civilization with nuclear technology can field these weapons."
  TORPEDO_2: "Fusion Missile Bay"
  TORPEDO_2_DESC: "Thermonuclear warhead with a yield measured in megatons. Magnetic compression drives a deuterium-tritium fusion reaction that obliterates armor through blast overpressure and thermal radiation. Hardened casing and terminal maneuvering improve survivability against point defense."
  TORPEDO_3: "Antimatter Missile Bay"
  TORPEDO_3_DESC: "Matter-antimatter annihilation warhead. Total mass-to-energy conversion delivers the highest energy density physically possible. A single impact can cripple a capital ship."

  # ============================================================
  # ENERGY TORPEDOES — G-slot particle beam weapons
  # Follow particle beam pattern (anti-shield)
  # ============================================================

  ENERGY_TORPEDO_1: "Directed-Yield Fission Missile Bay"
  ENERGY_TORPEDO_1_DESC: "A guided missile carrying a shaped fission warhead that channels the nuclear detonation into a focused plasma jet rather than an omnidirectional blast. The directed yield concentrates energy into a penetrating stream, devastating shield barriers through superheated charged-particle interaction."
  ENERGY_TORPEDO_2: "Directed-Yield Fusion Missile Bay"
  ENERGY_TORPEDO_2_DESC: "Advanced shaped nuclear warhead utilizing magnetic-pinch geometry to focus a fusion explosion into an ultra-narrow plasma jet. The focused energy stream penetrates deep into target structure, collapsing shields and irradiating everything beneath."

  # ============================================================
  # LASERS — Anti-armor specialists. Short range. Blocked by shields.
  # Physical rationale: Focused EM radiation ablates physical material.
  # Shields (plasma barriers) absorb EM radiation, protecting against lasers.
  # Reflective/ablative armor coatings resist laser damage — but at close range,
  # even the best coatings are overwhelmed by concentrated thermal energy.
  # ============================================================

  RED_LASER: "Fiber-Disc Laser"
  RED_LASER_DESC: "A solid-state laser using a fiber-optic gain medium arranged in a disc configuration. The design allows for efficient cooling and high power output, making it effective at ablating armor plating at close range. However, electromagnetic shields absorb much of the beam's energy, limiting effectiveness against shielded targets."
  BLUE_LASER: "Free-Electron Laser"
  BLUE_LASER_DESC: "A high-power laser that generates coherent light by accelerating electrons through a magnetic undulator. The resulting beam has a shorter wavelength and higher intensity than solid-state lasers, allowing it to penetrate heavier armor at medium range. Still vulnerable to shield absorption."
  UV_LASER: "UV Laser"
  UV_LASER_DESC: "A laser emitting in the vacuum ultraviolet spectrum. The shorter wavelength allows for more efficient energy coupling with armor materials, increasing ablation rates. However, the beam is heavily absorbed by electromagnetic shields, making it primarily effective against unshielded targets."
  XRAY_LASER: "X-Ray Laser"
  XRAY_LASER_DESC: "Free-electron laser technology produces coherent X-ray emission with extreme beam quality. The ultra-short wavelength focuses to near-diffraction-limited spot sizes over long distances, enabling effective armor ablation at ranges where lesser lasers have lost coherence."
  GAMMA_LASER: "Gamma-Ray Graser"
  GAMMA_LASER_DESC: "A nuclear-pumped gamma-ray laser — the most energetic directed-energy weapon achievable with known physics. The extremely short wavelength and enormous power density vaporize armor material faster than ablative coatings can shed heat. Requires immense reactor output."

