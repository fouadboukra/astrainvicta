  COMBAT_COMPUTER_TORPEDO_AUTONOMOUS: "Autonomous Torpedo Intellect"

  # ============================================================
  # UTILITY COMPONENTS — Reactor Boosters → Thermal Radiators
  # ============================================================

  REACTOR_BOOSTER_1: "Thermal Radiator Panel"
  REACTOR_BOOSTER_1_DESC: "Deployable radiator panels extending from the hull dissipate waste heat, allowing the reactor to operate at higher power output without thermal runaway."
  REACTOR_BOOSTER_2: "Extended Thermal Radiator"
  REACTOR_BOOSTER_2_DESC: "Larger radiator surface area with improved thermal conductivity. Enables sustained high-power operation of advanced weapon and shield systems."
  REACTOR_BOOSTER_3: "Active Cooling System"
  REACTOR_BOOSTER_3_DESC: "An active coolant circulation system that pumps heat from the reactor core to external radiator arrays. Provides the thermal management capacity required for the most power-hungry weapon configurations."

  tech_reactor_booster_1: "Thermal Radiators"
