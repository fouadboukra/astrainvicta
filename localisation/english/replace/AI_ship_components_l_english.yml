  MEDIUM_SUPERCHARGED_ION_CANNON: "Medium Supercharged Ion Cannon"
  LARGE_SUPERCHARGED_ION_CANNON: "Large Supercharged Ion Cannon"

  # ============================================================
  # PARTICLE BEAMS (was Plasma) — Shield strippers. Short range.
  # Physical rationale: Charged particles interact strongly with the EM
  # field that confines the shield plasma, disrupting magnetic confinement
  # and collapsing the barrier. Against physical armor, dense materials
  # stop the particles quickly. Against exposed hull, ionizing radiation
  # fries electronics, irradiates crew, and causes material embrittlement.
  # ============================================================

  PLASMA_1: "Electron Beam"
  PLASMA_1_DESC: "A compact electron accelerator projecting a focused stream of relativistic electrons. The charged particles interact violently with electromagnetic shield confinement fields, disrupting the plasma barrier. Low per-particle mass limits damage against physical armor, but the ionizing radiation is lethal to exposed electronics and crew."
  PLASMA_2: "Ion Beam"
  PLASMA_2_DESC: "A heavy-ion accelerator projecting focused streams of ionized heavy elements — iron, tungsten, or uranium ions. The dramatically greater particle mass delivers kinetic energy on impact that rivals small-caliber kinetic weapons while retaining the electromagnetic interaction that collapses shield barriers."
  PLASMA_3: "Antimatter Particle Beam"
  PLASMA_3_DESC: "Accelerates antiprotons to relativistic velocities. On contact with ordinary matter, the antiprotons annihilate, converting mass directly to energy. The combination of relativistic kinetic impact and annihilation energy makes this the most destructive particle weapon achievable, devastating to shields and lethal to anything beneath them."

  SMALL_PLASMA_1: "Small $PLASMA_1$"
  MEDIUM_PLASMA_1: "Medium $PLASMA_1$"
  LARGE_PLASMA_1: "Large $PLASMA_1$"
  SMALL_PLASMA_2: "Small $PLASMA_2$"
  MEDIUM_PLASMA_2: "Medium $PLASMA_2$"
  LARGE_PLASMA_2: "Large $PLASMA_2$"
  SMALL_PLASMA_3: "Small $PLASMA_3$"
  MEDIUM_PLASMA_3: "Medium $PLASMA_3$"
  LARGE_PLASMA_3: "Large $PLASMA_3$"

  # ============================================================
  # NEUTRON WEAPONS (was Disruptors) — Defense-penetrating.
  # Physical rationale: Neutrons are electrically neutral — invisible to
  # EM shields. They penetrate deep into matter, causing radiation damage
  # to electronics, material embrittlement, and crew casualties.
  # Dense armor (tungsten, lead) provides partial attenuation.
  # ============================================================

  DISRUPTOR_1: "Fission-Pumped Neutron Projector"
  DISRUPTOR_1_DESC: "A compact neutron source using a fission reaction to generate an intense flux of fast neutrons. The electrically neutral neutrons bypass electromagnetic shields and penetrate armor plating, causing devastating radiation damage to internal ship systems and crew. The weapon's compact design allows for multiple mounts on a single ship, saturating defenses with neutron flux."
  DISRUPTOR_2: "Deuterium-Tritium Neutron Projector"
  DISRUPTOR_2_DESC: "Fusion-based neutron source using deuterium-tritium reactions to produce an intense neutron flux. The high-energy neutrons penetrate shields and armor to cause devastating radiation damage to internal ship systems and crew. The weapon's compact design allows for multiple mounts on a single ship, saturating defenses with neutron flux."
  DISRUPTOR_3: "Cascading Neutron Projector"
  DISRUPTOR_3_DESC: "An advanced neutron weapon that uses a cascading spallation process to amplify neutron output. Each stage of the cascade generates additional neutrons, resulting in an intense, focused beam that delivers devastating radiation damage to internal ship systems and crew. The sheer volume of neutrons overwhelms any armor attenuation."

  SMALL_DISRUPTOR_1: "Small $DISRUPTOR_1$"
  MEDIUM_DISRUPTOR_1: "Medium $DISRUPTOR_1$"
  LARGE_DISRUPTOR_1: "Large $DISRUPTOR_1$"
  SMALL_DISRUPTOR_2: "Small $DISRUPTOR_2$"
  MEDIUM_DISRUPTOR_2: "Medium $DISRUPTOR_2$"
  LARGE_DISRUPTOR_2: "Large $DISRUPTOR_2$"
  SMALL_DISRUPTOR_3: "Small $DISRUPTOR_3$"
  MEDIUM_DISRUPTOR_3: "Medium $DISRUPTOR_3$"
  LARGE_DISRUPTOR_3: "Large $DISRUPTOR_3$"

  # ============================================================
  # CLOUD LIGHTNING → Directed Neutron Projector
  # ============================================================

  SPACE_CLOUD_WEAPON_1: "Directed Neutron Projector"
  SPACE_CLOUD_WEAPON_1_DESC: "A scaled-up neutron weapon derived from Void Cloud biology. Projects a directed flux of fast neutrons that bypasses both shields and armor to damage internal systems directly. Higher total damage output than small-mount neutron emitters, but with significant shot-to-shot variance."

  # ============================================================
  # MASS DRIVERS — Kinetic penetrators. Medium range. Bypass shields.
  # Physical rationale: Non-magnetic tungsten/DU penetrators at extreme
  # velocity have too much momentum for EM shields to meaningfully deflect.
  # 75% of kinetic damage bypasses shields entirely. The slug punches
  # through armor plating, creating spalling and internal fragmentation.
  # Low tracking — projectile travel time means maneuvering targets dodge.
  # ============================================================

  MASS_DRIVER_1: "Coilgun"
  MASS_DRIVER_1_DESC: "Sequential electromagnetic coils accelerate a ferromagnetic sabot-encased penetrator to higher muzzle velocities than basic mass drivers. The discarding sabot exposes a non-magnetic tungsten core that largely ignores electromagnetic shield barriers."
  MASS_DRIVER_2: "Lorentz Railgun"
  MASS_DRIVER_2_DESC: "Parallel conducting rails use the Lorentz force to accelerate a conductive armature at extreme velocity. The resulting impact delivers enormous kinetic energy concentrated in a tiny cross-section, punching through armor plating to cause internal spalling and fragmentation damage."
  MASS_DRIVER_3: "Helical Railgun"
  MASS_DRIVER_3_DESC: "A railgun variant that wraps the rails into a helical configuration, providing continuous acceleration along the barrel length. The extended acceleration path allows for higher muzzle velocities, increasing both range and armor penetration capability."
  MASS_DRIVER_4: "Plasma-Armature Railgun"
  MASS_DRIVER_4_DESC: "Replaces the solid armature with an ionized plasma sleeve that carries current between the rails. Eliminating metal-on-metal contact removes the velocity ceiling imposed by barrel erosion, enabling muzzle velocities that would destroy a conventional railgun after a single shot."
  MASS_DRIVER_5: "Relativistic Accelerator"
  MASS_DRIVER_5_DESC: "Controlled antimatter micro-annihilations generate electromagnetic pulses of extraordinary intensity, accelerating penetrators to velocities where relativistic mass increase becomes a factor. The energy density of antimatter reactions enables a class of kinetic weapon that was previously theoretical."

  SMALL_MASS_DRIVER_1: "Small $MASS_DRIVER_1$"
  MEDIUM_MASS_DRIVER_1: "Medium $MASS_DRIVER_1$"
  LARGE_MASS_DRIVER_1: "Large $MASS_DRIVER_1$"
  SMALL_MASS_DRIVER_2: "Small $MASS_DRIVER_2$"
  MEDIUM_MASS_DRIVER_2: "Medium $MASS_DRIVER_2$"
