  tech_reactor_booster_3_desc: "$REACTOR_BOOSTER_3_DESC$"

  # ============================================================
  # SHIELDS — Renamed for physical rationale
  # ============================================================

  SHIELD_1: "Electromagnetic Screen"
  SHIELD_1_DESC: "A basic electromagnetic barrier that ionizes ambient gas into a thin plasma window around the ship. Originally developed as a navigational deflector to protect against microdebris during high-speed transit, it provides modest protection against directed energy weapons."
  SHIELD_2: "Reinforced Electromagnetic Screen"
  SHIELD_2_DESC: "Improved field generators sustain a denser plasma barrier with better energy absorption characteristics. Increased protection against laser and particle beam weapons."
  SHIELD_3: "Plasma Barrier"
  SHIELD_3_DESC: "A new generation of shield technology utilizing magnetically-confined high-density plasma. The barrier absorbs electromagnetic radiation efficiently, providing significant protection against directed-energy weapons. Kinetic penetrators largely bypass the field due to their extreme momentum."
  SHIELD_4: "Magnetohydrodynamic Barrier"
  SHIELD_4_DESC: "Advanced magnetohydrodynamic confinement creates an extremely dense, stable plasma barrier. The field's interaction with electromagnetic radiation provides outstanding protection against lasers and particle beams."
  SHIELD_5: "Superconducting Plasma Barrier"
  SHIELD_5_DESC: "Superconducting field generators sustain the most powerful plasma barrier achievable with conventional physics. The energy absorption capacity is extraordinary, capable of withstanding sustained bombardment from multiple directed-energy sources simultaneously."

