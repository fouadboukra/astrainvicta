  EXTRADIMENSIONAL_1: "Dimensional Disintegrator"
  EXTRADIMENSIONAL_1_DESC: "Salvaged from extradimensional invaders, this weapon manipulates physics in ways our scientists cannot fully explain. It appears to excite molecular bonds in target materials, causing rapid structural disintegration. The technology is so far beyond our understanding that it may as well be magic."

