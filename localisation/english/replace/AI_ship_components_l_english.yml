  LARGE_MASS_DRIVER_5: "Large $MASS_DRIVER_5$"

  # ============================================================
  # AUTOCANNONS — Rapid-fire. Short range. High tracking.
  # Physical rationale: Small-caliber explosive shells fired at extreme
  # rate. Too small to meaningfully penetrate shields or heavy armor,
  # but excellent at shredding exposed hull and tracking small targets.
  # ============================================================

  AUTOCANNON_1: "Rotary Autocannon"
  AUTOCANNON_1_DESC: "A multi-barrel rotary cannon firing cased explosive shells via chemical propellant. Extremely high rate of fire with excellent target tracking, purpose-built for engaging small, evasive targets and combat drones at close range."
  AUTOCANNON_2: "Electrothermal Autocannon"
  AUTOCANNON_2_DESC: "An electrical discharge superheats a contained propellant gas, generating chamber pressures far beyond chemical combustion. The resulting muzzle velocity improvement makes each round hit harder without sacrificing the extreme fire rate that defines close-range engagements."
  AUTOCANNON_3: "Electromagnetic Repeater"
  AUTOCANNON_3_DESC: "A multi-barrel rotary weapon using miniaturized electromagnetic coils for projectile acceleration. Eliminating chemical propellant provides perfectly consistent muzzle velocity, zero barrel fouling, and sustained fire rates limited only by the ship's reactor output."

  SMALL_AUTOCANNON_1: "Small $AUTOCANNON_1$"
  MEDIUM_AUTOCANNON_1: "Medium $AUTOCANNON_1$"
  LARGE_AUTOCANNON_1: "Large $AUTOCANNON_1$"
