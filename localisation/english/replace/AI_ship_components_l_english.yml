  ARMOR_1: "Composite Plating"
  ARMOR_1_DESC: "Layered composite hull plating combining polymer matrices with ceramic reinforcement. Provides basic protection against kinetic impacts and blast damage."
  ARMOR_2: "Ceramic-Composite Plating"
  ARMOR_2_DESC: "Advanced ceramic-metal composite with superior hardness and fracture resistance. The ceramic component provides excellent heat resistance against directed energy, while the metal matrix absorbs kinetic shock."
  ARMOR_3: "Ablative Laminate Plating"
  ARMOR_3_DESC: "Multi-layer ablative armor designed to shed material sacrificially under laser bombardment, carrying thermal energy away with each vaporized layer. The laminate structure also distributes kinetic impact forces across a wider area."
  ARMOR_4: "Nanostructured Tungsten Plating"
  ARMOR_4_DESC: "Nanostructured tungsten-carbide composite with extraordinary density and hardness. The nanostructure provides resistance to both thermal ablation and kinetic penetration that far exceeds conventional alloys."
  ARMOR_5: "Ultra-Dense Composite Plating"
  ARMOR_5_DESC: "The most advanced armor composition achievable with known materials science. Ultra-dense nanostructured composites provide unmatched resistance to every conventional form of attack."

