  ### Traits
  leader_trait_prospectorium_refiner: "Prospectorium Refiner"
  leader_trait_prospectorium_refiner_desc: "Refiners have the rarefied expertise necessary to improve our acquisition of rare isotopes, transuranic ores, and photonic crystals."

