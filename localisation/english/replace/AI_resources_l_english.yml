  deficit.185.name: "Acute Photonic Crystal Deficits"
  deficit.185.desc: "Photonic crystals are becoming critically scarce across the [Root.Owner.GetName]. Shortages have cascaded through military optics, advanced sensor networks, and high-precision manufacturing lines in equal measure. [Owner.GetFinancialAdvisorAgencyCap] warns that without urgent intervention to expand extraction and fabrication capacity, severe systemic cutbacks will become unavoidable within months."
  deficit.185.A: "Reclaim crystals from [looted_planet.GetName]."
  deficit.185.B: "We will have to overexploit our deposits."
  deficit.185.C: "We can live with our crystals being rarer."
  deficit.190.desc: "Our photonic crystal reserves have fallen to the point where even critical military and industrial systems can no longer be reliably supplied. [Owner.GetFinancialAdvisorAgencyCap], noting grimly that the crystals are becoming rarer by the day, is now enforcing emergency rationing protocols to bring consumption back to sustainable levels."
  deficit.190.desc.wilderness: "Our supply of $rare_crystals$ has diminished to the point we can no longer maintain several critical functions. In extreme instances, we risk the lives of our more specialized symbionts who depend on this precious resource.\n\nTo prevent further loss of life and productivity, we must now rely on drastic means to ensure we once again reach equilibrium."

  deficit.200.name: "Acute Transuranic Shortages"
  deficit.200.desc: "Mismanagement and reckless expenditure have exhausted our transuranic ore reserves. This strategic material underpins everything from alloy production to high-yield warhead manufacturing. Without an immediate and sustained effort to expand extraction operations, the economic and military consequences will be severe and far-reaching."
  deficit.200.A: "Reclaim transuranics from [looted_planet.GetName]."
  deficit.200.B: "We will have to overexploit our deposits."
  deficit.200.C: "We can live with our transuranics becoming harder to source."
  deficit.205.desc: "The prolonged transuranic shortage has triggered an empire-wide economic contraction. Unable to service our resource debts, we have been forced to declare bankruptcy and restructure our obligations. [Owner.GetFinancialAdvisorAgencyCap] is drafting an austerity plan to stabilize supply chains and gradually restore our transuranic stockpiles."
  deficit.205.desc.gestalt: "The prolonged transuranic shortage has collapsed our empire-wide supply chain. It is no longer sustainable to maintain current consumption levels. [Owner.GetFinancialAdvisorAgencyCap] is enforcing a hard restructuring of our distribution systems to rebalance the budget and restore minimum operational reserves."
  deficit.205.desc.wilderness: "The shortage of $volatile_motes$ among our worlds has caused widespread disruption, not least to those extremophile worker-symbionts whose very lives depend on it. To prevent further loss of life and productivity, we must now institute drastic change to ensure basic continuity of life, in the hopes we might soon regain equilibrium."

  deficit.215.name: "Acute Rare Isotope Shortages"
  deficit.215.desc: "Rare isotopes have all but vanished from our empire's stockpiles, and their absence is propagating through our entire industrial base. Fusion reactors are running lean, shield systems are underperforming, and advanced sensor cooling has been compromised. [Owner.GetFinancialAdvisorAgencyCap] is urging an immediate reallocation of budgetary priorities before the situation becomes irreversible."
  deficit.215.A: "Reclaim isotopes from [looted_planet.GetName]."
  deficit.215.B: "We will have to overexploit our extraction operations."
  deficit.215.C: "We can live with our isotopes being harder to come by."
  deficit.220.desc: "Our empire can no longer absorb the cascading effects of the rare isotope shortage. Fusion output has dropped, shields are failing, and manufacturing processes that depend on isotopic cooling have ground to a halt. [Owner.GetFinancialAdvisorAgencyCap] has declared bankruptcy, and sharp rationing will be enforced while we work to slowly rebuild our reserves."
  deficit.220.desc.gestalt: "Our empire can no longer sustain the rare isotope shortages that have been degrading our fusion and manufacturing infrastructure. [Owner.GetFinancialAdvisorAgencyCap] has declared bankruptcy and is reorganizing our distribution systems to ensure minimum operational continuity while we rebuild our isotope stockpile."

  deficit_situation_finish_tooltip: "All penalties relating to the ongoing §Y[This.GetName]§! will be removed."
  deficit_situation_extra_defaulted_tooltip: "Resources will be freed up from our liquidated assets to allow us to rebuild."
