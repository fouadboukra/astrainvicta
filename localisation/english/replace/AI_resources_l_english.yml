l_english:
  ####################################
  # Ship Components
  ####################################
  # ============================================================
  # Astra Invicta - HARD SCI-FI WEAPON OVERHAUL — Localization Changes
  # Only entries that differ from the user's existing file.
  # Merge these into your existing localization file.
  # ============================================================
  volatile_motes: "Superheavy Transuranics"
  volatile_motes_desc: 'Metastable elements from the "Island of Stability" at the bottom of the periodic table. Their extreme nuclear density and potential for induced fission make them the ideal material for high-yield warheads and high-density reactive armor plating.'

  exotic_gases: "Rare Isotopes"
  exotic_gases_desc: "A collection of high-energy nucleons, including Helium-3 and Deuterium. Harvested from gas giant atmospheres, these isotopes are the gold standard for aneutronic fusion, powering the massive energy requirements of deflector shields and advanced sensor cooling systems."

  rare_crystals: "Photonic Crystals"
  rare_crystals_desc: "Mineral lattices with sub-wavelength periodic structures that manipulate the flow of electromagnetic radiation. They occur naturally in rare geological formations and can also be synthesized in laboratory conditions, making them essential for calibrating high-output laser apertures and providing the thermal conductivity required for overclocking multi-core quantum processors."

  sr_dark_matter: "Antimatter Clusters"
  sr_dark_matter_desc: "Highly unstable, artificially synthesized antimatter clusters. When contained and manipulated with precision, they can release tremendous energy, making them ideal for high-yield weaponry and experimental propulsion systems. However, their volatility requires advanced containment technologies to prevent catastrophic failures."

  sr_living_metal: "Programmable Matter"
  sr_living_metal_desc: 'A substrate of microscopic machines capable of altering their physical properties—such as density, conductivity, and shape—via software command. This "digital clay" can mimic any material, allowing for real-time hull repair and adaptive structural engineering.'

  nanites: "Nanites"
  nanites_desc: "Simple but powerful nanoactuators, allowing for complex manipulations and experiments of mesoscopic scales."

  ### Jobs and Edicts
  crystal_mining_drone: "$job_crystal_mining_drone$"
  job_crystal_mining_drone: "Crystal Mining Drone"
  job_crystal_mining_drone_plural: "Crystal Mining Drones"
  job_crystal_mining_drone_desc: "Miners specialized in identifying and extracting naturally occurring photonic crystal formations from rare geological deposits. The delicate periodic microstructures must be preserved during extraction, demanding both heavy machinery and painstaking precision."
  job_crystal_mining_drone_effect_desc: "[crystal_mining_drone.GetIcon] [crystal_mining_drone.GetNamePlural] produce £rare_crystals£ §Y$rare_crystals$§!"
  mod_job_crystal_mining_drone_add: "[crystal_mining_drone.GetName] Jobs"
  mod_job_crystal_mining_drone_per_pop: "§G+1§! [crystal_mining_drone.GetName] Job per $VALUE$ Pops"
  mod_job_crystal_mining_drone_per_pop_short: "\n§G+1§! £mod_job_crystal_mining_drone_add£ per $VALUE$ £pop£"

  mote_harvesting_drone: "$job_mote_harvesting_drone$"
  job_mote_harvesting_drone: "Transuranic Mining Drone"
  job_mote_harvesting_drone_plural: "Transuranic Mining Drones"
  job_mote_harvesting_drone_desc: "Drones specialized in the extraction of superheavy transuranic ores from deep geological and stellar remnant deposits. The extreme radioactivity and nuclear instability of these elements demands heavily shielded equipment and a high tolerance for occupational hazard."
  job_mote_harvesting_drone_effect_desc: "[mote_harvesting_drone.GetIcon] [mote_harvesting_drone.GetNamePlural] produce £volatile_motes£ §Y$volatile_motes$§!"
  mod_job_mote_harvesting_drone_add: "[mote_harvesting_drone.GetName] Jobs"
  mod_job_mote_harvesting_drone_per_pop: "§G+1§! [mote_harvesting_drone.GetName] Job per $VALUE$ Pops"
  mod_job_mote_harvesting_drone_per_pop_short: "\n§G+1§! £mod_job_mote_harvesting_drone_add£ per $VALUE$ £pop£"

  gas_extraction_drone: "$job_gas_extraction_drone$"
  job_gas_extraction_drone: "Isotope Extraction Drone"
  job_gas_extraction_drone_plural: "Isotope Extraction Drones"
  job_gas_extraction_drone_desc: "These specialized drones skim the upper atmospheres of gas giants and deploy centrifugal separation arrays to isolate and collect rare isotopes such as Helium-3 and Deuterium from the surrounding gas mix."
  job_gas_extraction_drone_effect_desc: "[gas_extraction_drone.GetIcon] [gas_extraction_drone.GetNamePlural] produce £exotic_gases£ §Y$exotic_gases$§!"
  mod_job_gas_extraction_drone_add: "[gas_extraction_drone.GetName] Jobs"
  mod_job_gas_extraction_drone_per_pop: "§G+1§! [gas_extraction_drone.GetName] Job per $VALUE$ Pops"
  mod_job_gas_extraction_drone_per_pop_short: "\n§G+1§! £mod_job_gas_extraction_drone_add£ per $VALUE$ £pop£"

  edict_terraforming_gas: "Isotopic Atmospheric Seeding"
  edict_terraforming_gas_desc: "By igniting controlled aneutronic fusion reactions in a planet's upper atmosphere using rare isotopes, we can rapidly drive large-scale atmospheric heating and chemical cycling, dramatically accelerating the terraforming process."
  edict_clearing_motes: "Transuranic Demolition"
  edict_clearing_motes_desc: "By exploiting the induced fission potential of superheavy transuranics, we can clear difficult terrain with precisely calibrated nuclear demolition charges, achieving results at a fraction of the time conventional methods would require."
  edict_crystalline_sensors: "Photonic Crystal Sensor Arrays"
  edict_crystalline_sensors_desc: "By integrating photonic crystals into our sensor apertures, we can manipulate and focus electromagnetic signals with extraordinary precision, achieving a crystal-clear picture of our surroundings far beyond conventional sensor ranges."
  edict_living_metal_construction: "Programmable Matter Mega-Construction"
  edict_living_metal_construction_desc: "The adaptive reconfiguration properties of programmable matter make it ideal for the dynamic structural demands of megastructure construction, allowing components to self-assemble and correct imperfections in real time."
  edict_fuel_gases: "Rare Isotope Fusion Drive"
  edict_fuel_gases_desc: "Helium-3 and Deuterium are exceptionally efficient fusion fuels for aneutronic drives, delivering high specific impulse with minimal radiation output. While not the most economical option, the performance gains for sublight travel are considerable."
  edict_shield_gases: "Isotopic Shield Enhancement"
  edict_shield_gases_desc: "Certain rare isotopes can be ionized and magnetically channeled to form dense plasma barriers around a vessel's shield emitters, reinforcing the dampening fields and significantly improving resistance to incoming energy and kinetic impacts."
  edict_motes_kinetic: "Transuranic Penetrators"
  edict_motes_kinetic_desc: "Dense slugs of superheavy transuranic alloy, machined to extreme tolerances, serve as devastating kinetic penetrators. Their nuclear density allows them to punch through conventional armor plating while their instability causes secondary fission damage on impact."
  edict_motes_explosives: "Transuranic Warheads"
  edict_motes_explosives_desc: "By engineering the induced fission cascade of superheavy transuranics into our missile warheads, we achieve yields and penetration depths far beyond conventional high-explosive ordnance, giving our ships significantly greater destructive reach."
  edict_motes_armor: "Transuranic Reactive Armor"
  edict_motes_armor_desc: "Armor plating layered with superheavy transuranic composites can initiate a controlled counter-fission pulse on impact, deflecting and absorbing incoming projectile energy. The result is a reactive system that reduces effective damage well beyond the limits of passive armor."
  edict_crystal_focus: "Photonic Crystal Focusing Arrays"
  edict_crystal_focus_desc: "By integrating rare photonic crystals into our ships' energy weapon apertures, we can achieve tighter beam coherence and higher energy-on-target delivery, meaningfully increasing the damage output of all directed-energy systems."
  edict_nanite_actuators: "Nanite Actuators"
  edict_nanite_actuators_desc: "$sr_distar_nanoactuator_desc$"

  ### Deposites
  d_dust_caverns: "Transuranic Ore Veins"
  d_dust_caverns_desc: "Deep geological formations where superheavy transuranic elements have concentrated over billions of years, drawn together by the planet's internal pressure and ancient stellar nucleosynthesis events. Heavily shielded extraction is mandatory."

  d_explosive_atmosphere: "Radioactive Particulate Atmosphere"
  d_explosive_atmosphere_desc: "Airborne concentrations of transuranic dust particles render this planet's atmosphere intensely radioactive and chemically reactive, posing severe risks to unshielded equipment and organic life alike."

  ### Buildings
  building_chemical_plant: "Nucleosynthesis Forges"
  building_chemical_plant_desc: 'Advanced facilities using particle accelerators to "force" heavy nuclei together.'

  building_refinery: "Isotope Fractionators"
  building_refinery_desc: "Specialized refineries equipped with centrifugal separation arrays and cryogenic processing chambers to extract and purify rare isotopes from raw gas mixtures."

  building_crystal_plant: "Crystal Epitaxy Labs"
  building_crystal_plant_desc: "Precision fabrication facilities that grow photonic crystals using chemical vapor deposition and molecular beam epitaxy techniques, allowing for the production of defect-free crystalline lattices with tailored electromagnetic properties."

  building_mote_harvesters: "Transuranic Excavators"
  building_mote_harvesters_desc: "These massive machines are designed to extract and process transuranic ores from the planet's crust."
  building_gas_extractors: "Isotope Extraction Wells"
  building_gas_extractors_desc: "These deep wells access pockets of rare isotopes within the planet's mantle."
  building_crystal_mines: "Crystal Quarries"
  building_crystal_mines_desc: "These massive quarries are designed to extract photonic crystals from the planet's crust."

  ### Technologies
  tech_exotic_gases: "Rare Isotope Extraction"
  tech_exotic_gases_desc: "While rare isotopes such as Helium-3 and Deuterium occur naturally in gas giant atmospheres, efficiently separating and refining them demands advanced centrifugal separation technology and cryogenic processing equipment."
  tech_volatile_motes: "Transuranic Ore Processing"
  tech_volatile_motes_desc: "Extracting usable superheavy transuranics from raw ore requires specialized containment reactors and radiation-hardened refinery equipment. The process demands extreme precision — a single containment failure can trigger an uncontrolled fission cascade."
  tech_rare_crystals: "Photonic Crystal Fabrication"
  tech_rare_crystals_desc: "While photonic crystals occur in rare natural deposits, demand far outstrips what can be mined. Synthetic fabrication using precision deposition chambers allows us to grow defect-free crystalline lattices to exact electromagnetic specifications."
  tech_mine_dark_matter: "Antimatter Synthesis"
  tech_mine_dark_matter_desc: "Antimatter cannot be found in stable concentrations in nature — it must be synthesized using particle accelerators drawing on the extreme energetic environments near black holes or within energetic nebulae. The resulting clusters require immediate magnetic containment to prevent annihilation."

