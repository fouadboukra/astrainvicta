 ### SOL SECTOR LOCALISATION
 ###### SOL 1
 civic_spawns_in_sol:0 "Government of Sol"
 civic_spawns_in_sol_desc:0 "This is the government of the Sol System.\n§SThis civic will place this empire in a pre-determined location within the Sol Sector static map.§ \n§EOnce the game starts you will be able to replace this Civic with another one.§ \n§RDo not place this same exact civic on multiple forced spawn empires or your PC might or might not collapse into a black hole and kill all life on the planet!§"
 sol_sector_sol_earth_initializer_NAME:0 "Earth/Sol/SS"
 sol_sector_sol_earth_initializer_DESC:0 "Sol, from the Sol Sector mod, with Earth being your starting planet.§SThis only determines the layout of the starting system, to start in a specific location in the galaxy map you must select the appropiate Civic.§"
 sol_sector_sol_mars_initializer_NAME:0 "Mars/Sol/SS"
 sol_sector_sol_mars_initializer_DESC:0 "Sol, from the Sol Sector mod, with Mars being your starting planet.§SThis only determines the layout of the starting system, to start in a specific location in the galaxy map you must select the appropiate Civic.§"
