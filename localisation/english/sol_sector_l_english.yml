l_english:
  ### ASTRA INVICTA - LOCAL BUBBLE SPAWN ORIGINS
  ###### SOL
  civic_astra_invicta_spawns_in_sol: " Home System: Sol"
  civic_astra_invicta_spawns_in_sol_desc: "Born of the cradle of sapience, this civilization traces its origins to the Sol System - the fountainhead of all known spacefaring expansion. Whether they departed from the blue-green shores of Earth or the rust-red plains of Mars, the pull of Sol's gravity well is as much cultural as it is astronomical.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_sol_earth_initializer_NAME: "Sol - Earth Origin"
  astra_invicta_sol_earth_initializer_DESC: "The Sol System, with Earth as the starting world. A single G-type star orbited by eight major planets, including the sole confirmed garden world in the solar neighborhood at the time of first contact.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  astra_invicta_sol_mars_initializer_NAME: "Sol - Martian Origin"
  astra_invicta_sol_mars_initializer_DESC: "The Sol System, with Mars as the starting world. Humanity's first extraterrestrial foothold - a cold, thin-atmosphered world whose terraforming history shaped generations of planetary engineering doctrine.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### ALPHA CENTAURI
  civic_astra_invicta_spawns_in_alpha_centauri: " Home System: Alpha Centauri"
  civic_astra_invicta_spawns_in_sector_alpha_centauri_desc: "The nearest stellar system to Sol, Alpha Centauri was the first destination of interstellar colonization efforts. A civilization rooted here carries the legacy of that first audacious crossing - 4.37 light-years of void, crossed in the span of a human lifetime.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_alpha_centauri_initializer_NAME: "Alpha Centauri"
  astra_invicta_alpha_centauri_initializer_DESC: "A triple star system - two Sun-like stars in close binary orbit, attended by the dim red dwarf Proxima at the fringes. Humanity's closest stellar neighbors, and the first system beyond Sol to bear permanent habitation.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### LUYTEN'S STAR
  civic_astra_invicta_spawns_in_luytens_star: " Home System: Luyten's Star"
  civic_astra_invicta_spawns_in_luytens_star_desc: "A civilization that took root around the quiet red dwarf Luyten's Star, 12.4 light-years from Sol. Its comparatively low flare activity and temperate habitable-zone companion made it a pragmatic choice for early settlers - a place defined more by patience and utility than by ambition.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_luytens_star_initializer_NAME: "Luyten's Star"
  astra_invicta_luytens_star_initializer_DESC: "A red dwarf 12.4 light-years from Sol, notable for hosting GJ 273b - a candidate habitable world well within the system's conservative habitable zone. Stellar activity is unusually subdued for its class, a factor that proved decisive for early colonization efforts.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### ROSS 128
  civic_astra_invicta_spawns_in_ross_128: " Home System: Ross 128"
  civic_astra_invicta_spawns_in_ross_128_desc: "Ross 128 was chosen for colonization not for its grandeur, but for its stability. The flare-quiet red dwarf sits 11 light-years from Sol, and the civilization that emerged here learned early that survival hinges on engineering precision, not stellar fortune.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_ross_128_initializer_NAME: "Ross 128"
  astra_invicta_ross_128_initializer_DESC: "A red dwarf 11 light-years from Sol - among the least magnetically active stars of its class, which made it an attractive site for early surface colonization. Ross 128b orbits well within the habitable zone and receives comparatively low levels of harmful ultraviolet radiation.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### ETA CASSIOPEIAE
  civic_astra_invicta_spawns_in_eta_cassiopeiae: " Home System: Eta Cassiopeiae"
  civic_astra_invicta_spawns_in_eta_cassiopeiae_desc: "This civilization grew from the binary Eta Cassiopeiae system, 19.4 light-years from Sol - two stars in slow mutual orbit, a Sun-like primary and a cooler K-type companion. The unique gravitational geometry of a binary origin shaped an early culture fascinated with duality, orbital dynamics, and the mechanics of coexistence.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_eta_cassiopeiae_initializer_NAME: "Eta Cassiopeiae"
  astra_invicta_eta_cassiopeiae_initializer_DESC: "A binary system 19.4 light-years from Sol. The primary, Eta Cassiopeiae A, is a G-type star broadly similar to the Sun. Its K-type companion completes an orbit every several centuries, creating a slowly shifting gravitational environment for any worlds that formed in between.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### TEEGARDEN'S STAR
  civic_astra_invicta_spawns_in_teegardens_star: " Home System: Teegarden's Star"
  civic_astra_invicta_spawns_in_teegardens_star_desc: "Teegarden's Star hosts two of the most promising candidate habitable worlds in the solar neighborhood - and the civilization that settled here built its identity around frontier endurance under a dim, ancient star. At 12.5 light-years from Sol, it was among the earlier red dwarf systems to receive permanent colonists.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_teegardens_star_initializer_NAME: "Teegarden's Star"
  astra_invicta_teegardens_star_initializer_DESC: "An ultra-cool red dwarf and one of the oldest stars in the solar neighborhood, located 12.5 light-years from Sol. Two rocky planets - Teegarden b and c - orbit within the habitable zone with Earth Similarity Index values among the highest recorded for any confirmed exoplanets.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### WOLF 1061
  civic_astra_invicta_spawns_in_wolf_1061: " Home System: Wolf 1061"
  civic_astra_invicta_spawns_in_wolf_1061_desc: "Wolf 1061c sits in the habitable zone of its red dwarf host - a tidally influenced world whose colonization demanded novel solutions to atmospheric retention, temperature gradients, and orbital resonance. The civilization that endured here learned to build for extremes.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_wolf_1061_initializer_NAME: "Wolf 1061"
  astra_invicta_wolf_1061_initializer_DESC: "A red dwarf 13.8 light-years from Sol with a confirmed multi-planet system. Wolf 1061c lies within the habitable zone, though its proximity to the star suggests significant tidal forces - a world on the edge of habitability that colonists learned to call home.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### TAU CETI
  civic_astra_invicta_spawns_in_tau_ceti: " Home System: Tau Ceti"
  civic_astra_invicta_spawns_in_tau_ceti_desc: "Tau Ceti has long occupied a special place in the colonial imagination - a Sun-like star 11.9 light-years from Sol with candidate worlds in its habitable zone. The civilization rooted here inherited that mythology and built from it: a society shaped by the idea that they were, from the very beginning, somewhere that mattered.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_tau_ceti_initializer_NAME: "Tau Ceti"
  astra_invicta_tau_ceti_initializer_DESC: "A G-type star 11.9 light-years from Sol, broadly similar to the Sun in mass, temperature, and luminosity. The Tau Ceti system hosts several candidate planets, though its high concentration of debris-disk material suggests an impact-heavy geological history.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### BETA COMAE BERENICES
  civic_astra_invicta_spawns_in_beta_comae_berenices: " Home System: Beta Comae Berenices"
  civic_astra_invicta_spawns_in_beta_comae_berenices_desc: "At 29.9 light-years from Sol, Beta Comae Berenices was a long-range venture - one of the furthest early destinations, settled by those unwilling to crowd the inner systems. Its near-solar twin host star shaped a civilization with a peculiar self-assurance: they knew what a home star was supposed to look like, and they had one.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_beta_comae_berenices_initializer_NAME: "Beta Comae Berenices"
  astra_invicta_beta_comae_berenices_initializer_DESC: "A G-type star 29.9 light-years from Sol - one of the most accurate solar analogues in the stellar neighborhood, sometimes designated a near-solar twin. Its physical similarity to the Sun made it a natural candidate for long-range colonization once the closer red dwarf systems were occupied.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### GLIESE 667
  civic_astra_invicta_spawns_in_gliese_667: " Home System: Gliese 667"
  civic_astra_invicta_spawns_in_gliese_667_desc: "Few systems in the solar neighborhood rival the complexity of Gliese 667 - a triple star system 23.6 light-years from Sol, whose dim C-component hosts multiple worlds in or near the habitable zone. The civilization born here mastered multi-body orbital navigation before it ever left its own star cluster.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_gliese_667_initializer_NAME: "Gliese 667"
  astra_invicta_gliese_667_initializer_DESC: "A hierarchical triple star system 23.6 light-years from Sol. The K-type binary pair GJ 667AB dominate the system; the distant red dwarf GJ 667C hosts up to three candidate habitable worlds - an unusually dense concentration of potentially life-bearing planets around a single dim star.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### 82 G. ERIDANI
  civic_astra_invicta_spawns_in_82_g_eridani: " Home System: 82 G. Eridani"
  civic_astra_invicta_spawns_in_82_g_eridani_desc: "82 G. Eridani is an old star - older than Sol, quieter, burning at a lower intensity 19.7 light-years away. The civilization shaped by its light developed a culture of long-horizon thinking: patient, methodical, and deeply aware that the universe does not hurry.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_82_g_eridani_initializer_NAME: "82 G. Eridani"
  astra_invicta_82_g_eridani_initializer_DESC: "A G-type star 19.7 light-years from Sol, older and slightly less luminous than the Sun. Three confirmed super-Earth candidates orbit within or near the habitable zone, making it one of the more compelling multi-planet systems in the local stellar neighborhood.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### 40 ERIDANI
  civic_astra_invicta_spawns_in_40_eridani: "Home System: 40 Eridani"
  civic_astra_invicta_spawns_in_40_eridani_desc: "40 Eridani - also known as Keid - is a hierarchical trinary system 16.3 light-years from Sol. Its K-type primary hosts a plausible habitable zone, while its distant companions are a white dwarf and a red dwarf flare star in close mutual orbit. A civilization that emerged here learned early to navigate complex gravitational geometry and the long shadow of stellar remnants.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_40_eridani_initializer_NAME: "40 Eridani"
  astra_invicta_40_eridani_initializer_DESC: "A hierarchical trinary system 16.3 light-years from Sol. The K0.5V primary, 40 Eridani A, hosts a compact inner system including an arid habitable-zone world. Some 400 AU distant, 40 Eridani B - a DA4 white dwarf, the closest such object to Sol - orbits in close company with 40 Eridani C, an M4.5Ve flare star. The system's age and its white dwarf companion make it one of the more scientifically distinctive targets in the solar neighborhood.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
  ###### DELTA PAVONIS
  civic_astra_invicta_spawns_in_delta_pavonis: " Home System: Delta Pavonis"
  civic_astra_invicta_spawns_in_delta_pavonis_desc: "Delta Pavonis is a subgiant winding down its main sequence life - a star past its prime, radiating more broadly than the Sun, reshaping the habitable zone it once hosted. The civilization here built its identity around impermanence: nothing lasts, everything must be prepared for.\n§SSelecting this civic anchors your empire's starting position within the Local Bubble map.§\n§EThis civic can be replaced once the game begins.§\n§RAssigning the same spawn civic to multiple empires will cause a conflict in the scenario logic. Each system civic must be unique.§"
  astra_invicta_delta_pavonis_initializer_NAME: "Delta Pavonis"
  astra_invicta_delta_pavonis_initializer_DESC: "A G-type subgiant 19.9 light-years from Sol, slightly older and more evolved than the Sun. Delta Pavonis has begun its slow drift off the main sequence, increasing its luminosity over geological time - a world here sits in an evolving habitable zone, one whose window of hospitability is, on cosmic scales, finite.§SThis setting determines your home system layout. To fix your position on the galaxy map, pair it with the appropriate origin civic.§"
